# NBINet training config — IMX585 (ZWO ASI585MC) dataset
# 4160 groups S1/L/S2 3-frame RAW, 12-bit RGGB Bayer
# Pretrain on server, then finetune on OV13855

save_mode: epoch
save_by_epoch: 1
cudnn_benchmark: True

Training_config:
  phase: unified
  epochs: 200
  train_batch_size: 8
  val_batch_size: 1
  num_workers: 8
  start_idx: 0
  show_loss_iter: 100
  show_img_iter: 2000

GNet:
  name: 'NBINet'
  init_type: 'kaiming'
  init_gain: 0.02
  finetune_path: ''
  force_load: False
  args:
    in_channel: 4
    out_channel: 3
    ngf: 10
    activ: 'relu'
    norm: 'none'
    pad_type: 'zero'
    final_activ: 'none'
    res_num: 2
    bottleneck_res_num: 4

Loss:
  L1Loss:
    weight: 100.0
    mode: 'l1'

Optimizer:
  name: 'Adam'
  args:
    lr_g: 0.0002
    b1: 0.5
    b2: 0.999
    weight_decay: 0.0
  lr_decrease_mode: 'epoch'
  lr_decrease_epoch: 80
  lr_decrease_factor: 0.5

Dataset:
  dataset_type: 'imx585'
  root_path: '/home/dc2026_2/dataset/raw_d2hnet_asi585mc'
  input_format: 'raw_rggb'
  gt_format: 'rgb'
  max_val: 4095
  black_level: 96
  bayer_pattern: 'RGGB'
  noise_aug: False
  random_crop: True
  crop_size: 320
  patch_per_image: 4
